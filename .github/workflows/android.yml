name: Android CI

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run Linter (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt

  unit-test:
    name: Run Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Voller Verlauf, damit das Diff-Coverage-Gate gegen den Basis-Branch diffen kann.
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests with Coverage
        run: ./gradlew koverXmlReportDebug koverLogDebug

      - name: Verify Coverage Threshold
        run: ./gradlew koverVerifyDebug

      - name: Add Coverage to Summary
        id: coverage
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          REPORT_FILE=$(find app/build/reports/kover -name "*.xml" | head -n 1)
          if [ -z "$REPORT_FILE" ]; then
            echo "Kein Coverage-Report gefunden. Stelle sicher, dass koverXmlReportDebug ausgeführt wurde." | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          python .github/scripts/kover_summary.py "$REPORT_FILE" > /tmp/coverage_summary.md
          cat /tmp/coverage_summary.md | tee -a $GITHUB_STEP_SUMMARY

          # Kurz in den Job-Logs sichtbar machen
          OVERALL=$(python .github/scripts/kover_summary.py "$REPORT_FILE" --overall)
          echo "Coverage: $OVERALL"
          echo "::notice title=Coverage::$OVERALL"

      - name: Diff Coverage Gate (nur PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
          REPORT_FILE=$(find app/build/reports/kover -name "*.xml" | head -n 1)
          python .github/scripts/diff_coverage.py "$REPORT_FILE" \
            --base "origin/${{ github.base_ref }}" --threshold 80 | tee -a $GITHUB_STEP_SUMMARY

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test & Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/reports/kover
          if-no-files-found: warn

  instrumented-test:
    name: Run Instrumented Tests (Emulator)
    # ubuntu-latest unterstuetzt KVM-Hardwarebeschleunigung fuer den Emulator.
    runs-on: ubuntu-latest
    needs: [unit-test]
    # Vorerst non-blocking: der Job meldet Ergebnisse, blockiert die Pipeline aber noch nicht,
    # bis die UI-Tests in CI als stabil bestaetigt sind. Danach diese Zeile entfernen.
    continue-on-error: true
    strategy:
      matrix:
        api-level: [30]
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD-Snapshot erstellt."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-reports
          path: app/build/reports/androidTests/connected
          if-no-files-found: warn

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
