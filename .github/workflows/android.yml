name: Android CI

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run Linter (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt

  unit-test:
    name: Run Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests with Coverage
        run: ./gradlew koverXmlReportDebug koverLogDebug

      - name: Add Coverage to Summary
        id: coverage
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          REPORT_FILE=$(find app/build/reports/kover -name "*.xml" | head -n 1)
          if [ -z "$REPORT_FILE" ]; then
            echo "Kein Coverage-Report gefunden. Stelle sicher, dass koverXmlReportDebug ausgeführt wurde." | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

          python .github/scripts/kover_summary.py "$REPORT_FILE" > /tmp/coverage_summary.md
          cat /tmp/coverage_summary.md | tee -a $GITHUB_STEP_SUMMARY

          # Kurz in den Job-Logs sichtbar machen
          OVERALL=$(python .github/scripts/kover_summary.py "$REPORT_FILE" --overall)
          echo "Coverage: $OVERALL"
          echo "::notice title=Coverage::$OVERALL"

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
