name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint:
    name: Run Linter (Detekt)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Detekt
      run: ./gradlew detekt

  unit-test:
    name: Run Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests with Coverage
      run: ./gradlew koverLogDebug koverXmlReportDebug

    - name: Add Coverage to Summary
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        # Extrahiere die Prozentzahl aus dem Log-Output (Kover Log zeigt das oft an)
        # Oder wir nutzen den XML Report für eine detailliertere Ansicht falls nötig.
        echo "Coverage Report generated successfully." >> $GITHUB_STEP_SUMMARY

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: app/build/reports/kover/

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
